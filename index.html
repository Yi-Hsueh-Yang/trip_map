<script>
var S=[
{n:"哈爾濱太平機場",lat:45.625,lng:126.245,e:"✈️",c:"#7f8c8d",d:[1,11],dl:"Day 1 & 11",desc:"黑龍江省最大機場，距市區約35公里。全程安排考斯特專車接送機＋行李運送車。",see:"<b>👀 必知</b>機場到市區車程約40分鐘。Day 11 根據航班時間彈性送機。",eat:"",tip:"<b>💡 提醒</b>5月哈爾濱10-22°C，早晚溫差大，下飛機加件薄外套！"},
{n:"繁花一宿酒店（大本營）",lat:45.778,lng:126.678,e:"🏨",c:"#e74c3c",d:[1,2,5,6,7,8,9,10],dl:"Day 1-2, 5-10",desc:"旅程溫暖大本營！11天有8晚住這裡，早餐在「晨禾餐廳」，有素食選項。",see:"<b>👀 住宿亮點</b>每天從這出發探索不同景點，傍晚回到溫暖的家。",eat:"<b>🍽️ 晚餐精選</b>桃花源記音樂中餐廳（邊聽演奏邊吃）、俄式西餐廳（紅菜湯、罐燜牛肉）、山河屯鐵鍋燉（圍灶台吃大鍋菜超有氛圍！）、臻馨火鍋⋯幾乎不重複！",tip:"<b>💡 提醒</b>東北空氣乾燥，帶保濕品和潤唇膏！室內暖氣足，注意溫差。"},
{n:"東北虎林園",lat:45.810,lng:126.535,e:"🐯",c:"#f39c12",d:[2],dl:"Day 2",desc:"世界最大東北虎繁育基地！數百隻東北虎，還有白虎、獅子、獅虎獸、美洲豹等。分車行區和步行區。",see:"<b>👀 必看</b>① 搭觀光車穿越虎群（含電瓶車）② 餵食表演超震撼 ③ 步行區看幼虎、餵羊駝兔子 ④ 門口免費科普陳列館",eat:"<b>🍽️ 當日</b>午：外婆小廚融合菜（有素食）｜晚：桃花源記音樂中餐廳或隱溪小館",tip:"<b>💡 Tips</b>建議早上去，老虎比較活躍！下午多在睡覺。車上可買肉餵虎（20元/塊）。"},
{n:"哈爾濱大劇院",lat:45.838,lng:126.528,e:"🎭",c:"#9b59b6",d:[2],dl:"Day 2",desc:"MAD建築事務所設計的松北文化地標，靈感源自冰雪與松花江，流線造型如雪地中生長的白色有機體。",see:"<b>👀 必看</b>① 建築本身就是最大看點，白色曲線超夢幻 ② 頂部觀景平台可俯瞰松花江濕地 ③ 拍照聖地！",eat:"",tip:"<b>💡 Tips</b>外觀免費拍照，內部需購票。預留30-40分鐘。"},
{n:"大世界夢幻冰雪館",lat:45.821,lng:126.521,e:"❄️",c:"#3498db",d:[2],dl:"Day 2",desc:"冰雪大世界全年開放室內館！恆溫-15°C，精美冰雕雪雕冰燈，融合燈光特效與互動體驗。夏天也能玩雪！",see:"<b>👀 必看</b>① 大型冰雕在彩色燈光下晶瑩剔透 ② 冰滑梯超好玩 ③ 360°冰雕拍照區 ④ 四季都能體驗冰雪世界",eat:"<b>🍽️ 哈爾濱必吃</b>馬迭爾冰棍（1906年創立，5元/支）、鍋包肉（酸甜酥脆代表菜）、秋林紅腸、大列巴麵包",tip:"<b>💡 Tips</b>館內-15°C會提供棉衣，自備圍巾手套更好。暖寶寶貼手機背面防掉電！"},
{n:"紮龍自然保護區",lat:47.208,lng:124.249,e:"🦩",c:"#27ae60",d:[3],dl:"Day 3",desc:"中國第一個丹頂鶴保護區，「丹頂鶴的故鄉」。全球2000多隻丹頂鶴，數百隻在此繁衍。面積2100平方公里。",see:"<b>👀 必看</b>① 丹頂鶴放飛表演——數十隻同時起飛超壯觀！（含電瓶車）② 近距離觀察丹頂鶴、白枕鶴 ③ 5月綠意盎然最佳季節 ④ 帶長焦鏡頭",eat:"<b>🍽️ 當日</b>午：米家烤肉/呂屯一頭牛烤肉（東北大口吃肉！）｜晚：蔔味樓清真菜",tip:"<b>💡 Tips</b>放飛表演有固定時間，提前確認。5月蚊蟲多帶防蚊液！"},
{n:"齊齊哈爾市區",lat:47.345,lng:123.968,e:"🏙️",c:"#2c3e50",d:[3],dl:"Day 3 住宿",desc:"黑龍江第二大城「鶴城」，達斡爾語意「天然牧場」。嫩江穿城而過，從哈爾濱約300公里。",see:"<b>👀 特色</b>東北豪邁城市風情＋嫩江江景＋齊齊哈爾烤肉全國聞名",eat:"<b>🍽️ 必吃</b>齊齊哈爾烤肉！自己炭火烤牛羊肉，蘸料簡單吃原味。蔔味樓清真菜也是名店。",tip:"<b>💡 Tips</b>住四鑽酒店。比哈爾濱更冷注意保暖。"},
{n:"世界地質公園博物館",lat:48.745,lng:126.085,e:"🌋",c:"#e67e22",d:[4],dl:"Day 4",desc:"五大連池火山奇觀「第一課堂」。14座火山、5個熔岩堰塞湖，「天然火山博物館」。",see:"<b>👀 必看</b>① 14座火山形成史（最近噴發1719-1721年！）② 火山岩石標本模型 ③ 互動展覽",eat:"<b>🍽️ 當日</b>午：江滿秋青花椒烤魚｜晚：桃花十裏小酒館/老式銅鍋涮肉",tip:"<b>💡 Tips</b>五大連池酒店贈送溫泉門票（視天氣），晚上泡溫泉超放鬆！"},
{n:"北飲泉",lat:48.733,lng:126.102,e:"💧",c:"#16a085",d:[4],dl:"Day 4",desc:"天然含氣冷礦泉，富含礦物質，口感帶鐵鏽味和氣泡感，像天然礦泉氣泡水。據說有養生功效。",see:"<b>👀 體驗</b>① 親自品嘗！口感很特別 ② 泉眼旁各色礦物沉澱適合拍照 ③ 火山地貌與森林形成對比",eat:"",tip:"<b>💡 Tips</b>泉水約2-4°C超涼，腸胃敏感少量品嘗！帶杯子別猛灌。"},
{n:"老黑山/龍門石寨",lat:48.720,lng:126.120,e:"🪨",c:"#555",d:[5],dl:"Day 5",desc:"中國最年輕火山！海拔515.9米，黑色浮石山體。龍門石寨30萬年前火山噴發，巨型熔岩如古城堡。",see:"<b>👀 必看</b>① 登火山口俯瞰壯觀地貌 ② 木棧道穿越熔岩石海 ③ 石縫頑強植物 ④ 贈送溫泊遊船（視天氣）",eat:"<b>🍽️ 當日</b>午：全民野生活魚豆腐宴（礦泉水養的魚超鮮！）｜晚回哈爾濱：六喜宴/臻馨火鍋",tip:"<b>💡 Tips</b>木棧道1-2小時穿防滑鞋。車程長(~350km)可在車上休息。"},
{n:"紅磚街早市",lat:45.770,lng:126.635,e:"🥟",c:"#e74c3c",d:[6],dl:"Day 6 早上",desc:"東北煙火氣爆棚的「網紅」打卡早市！攤販叫賣、各種東北早餐小吃琳瑯滿目。",see:"<b>👀 體驗</b>最道地東北早市文化＋攤位拍照超有煙火氣＋旁邊就是道里菜市場",eat:"<b>🍽️ 必吃</b>① 煎餅果子 ② 包子油條豆漿 ③ 肉蛋堡 ④ 干炸里脊 ⑤ 凍梨汁 ⑥ 秋林格瓦斯（俄式麵包味汽水）",tip:"<b>💡 Tips</b>今天早餐自理在早市吃！7:30前到，太晚好東西賣完。"},
{n:"中華巴洛克風景區",lat:45.774,lng:126.656,e:"🏛️",c:"#8e44ad",d:[6],dl:"Day 6",desc:"中國最大最完整「中華巴洛克」建築群。外部歐洲巴洛克浮雕，內部中式四合院。曾是哈爾濱工商業發源地。",see:"<b>👀 必看</b>① 中西合璧超獨特 ② 百年建築內文創店咖啡館 ③ 市井文化活化石 ④ 隨便拍都出片",eat:"",tip:""},
{n:"聖索菲亞教堂",lat:45.771,lng:126.651,e:"⛪",c:"#8e44ad",d:[6],dl:"Day 6",desc:"1907年建拜占庭風格教堂，洋蔥頭穹頂高48.55米，遠東最大東正教堂之一，哈爾濱地標。現為建築藝術館。",see:"<b>👀 必看</b>① 洋蔥頭穹頂必拍！② 夜晚燈光更夢幻 ③ 廣場常有音樂表演和鴿子 ④ 內部門票便宜",eat:"<b>🍽️ 周邊</b>對面道里菜市場有干炸里脊、南瓜餅等地道小吃。",tip:"<b>💡 Tips</b>傍晚日落和燈光初上最美人也少。"},
{n:"中央大街&防洪紀念塔",lat:45.778,lng:126.622,e:"🚶",c:"#8e44ad",d:[6],dl:"Day 6",desc:"始建於1898年，全長1400米，亞洲最長商業步行街。71座歐式建築，「建築歷史博物館」。防洪紀念塔紀念1957年大洪水。",see:"<b>👀 必看</b>① 百年石頭路面＋建築長廊 ② 馬迭爾賓館百年法式建築 ③ 防洪塔旁眺望松花江 ④ 晚上燈光璀璨有街頭音樂",eat:"<b>🍽️ 必吃</b>① 馬迭爾冰棍（1906年，5元/支）② 秋林紅腸（認準「秋林里道斯」「哈肉聯」）③ 大列巴 ④ 鍋包肉 ⑤ 塔道斯西餐廳（1901年，紅菜湯罐燜牛肉）<br>午：三八飯店/宴賓樓｜晚：俄式西餐廳/宏達老菜館",tip:"<b>💡 Tips</b>部分餐廳有「遊客價」去本地人分店。買紅腸認準老字號！"},
{n:"千鶴島風景區",lat:45.916,lng:126.386,e:"🦢",c:"#16a085",d:[7],dl:"Day 7",desc:"蘆葦沼澤中的鶴鳥天堂。春秋丹頂鶴、白枕鶴、蓑羽鶴群聚，觀鳥攝影「聖地」。原始蘆葦蕩生態自然。",see:"<b>👀 必看</b>① 含遊船穿越蘆葦蕩近距離觀水鳥 ② 5月鶴類繁殖季 ③ 蘆葦蕩風光隨手拍都是壁紙 ④ 比紮龍更原始安靜",eat:"<b>🍽️ 當日</b>午：千鶴島景區｜晚：辛氏火爐",tip:"<b>💡 Tips</b>帶防曬防蚊液！攝影帶長焦200mm+。"},
{n:"伏爾加莊園",lat:45.672,lng:127.022,e:"🏰",c:"#27ae60",d:[8],dl:"Day 8",desc:"俄羅斯文化主題大莊園。異地重建經典俄式建築：聖尼古拉教堂（原地標已毀）、巴甫洛夫城堡等，露天俄式建築博物館。",see:"<b>👀 必看</b>① 聖尼古拉教堂精確復刻 ② 巴甫洛夫城堡如莫斯科郊外 ③ 阿什河畔俄式風情 ④ 拍婚紗照熱門地",eat:"<b>🍽️ 當日</b>午：莊園內俄式午餐｜晚：山河屯鐵鍋燉（大鐵鍋燉大鵝配玉米餅，圍灶台超有氛圍！）",tip:"<b>💡 Tips</b>莊園很大穿舒適鞋。5月綠意盎然最佳拍照季。"},
{n:"金上京歷史博物館",lat:45.545,lng:126.963,e:"📜",c:"#c4943d",d:[9],dl:"Day 9",desc:"全國唯一金代（1115-1234）歷史博物館。展示女真族建金朝興衰，國家一級博物館。",see:"<b>👀 必看</b>① 含專業講解！完顏阿骨打建國傳奇 ② 金代金銀器、銅鏡、陶瓷 ③ 建築融合金代風格",eat:"<b>🍽️ 當日</b>午：洪億峰殺豬菜（東北農家必吃！酸菜血腸五花肉一鍋燉）",tip:""},

var aD='all';
function bF(){
  var b=document.getElementById('fb');
  var a=document.createElement('button');a.className='db on';a.textContent='全部';a.onclick=function(){fD('all')};b.appendChild(a);
  for(var i=1;i<=11;i++){var x=document.createElement('button');x.className='db';x.textContent='D'+i;x.dataset.day=i;x.onclick=(function(d){return function(){fD(d)}})(i);b.appendChild(x)}
}
function fD(day){
  aD=day;map.closePopup();
  document.querySelectorAll('.db').forEach(function(b){if(day==='all')b.classList.toggle('on',b.textContent==='全部');else b.classList.toggle('on',Number(b.dataset.day)===day)});
  ML.clearLayers();var v=[];
  M.forEach(function(m){if(day==='all'||m._sd.d.indexOf(day)>-1){ML.addLayer(m);v.push(m)}});
  RL.forEach(function(l,i){if(day==='all')l.setStyle({opacity:.55,weight:3});else if(RD[i]===day)l.setStyle({opacity:.75,weight:4});else l.setStyle({opacity:.08,weight:1.5})});
  if(v.length>0&&day!=='all')map.fitBounds(L.featureGroup(v).getBounds().pad(.3),{maxZoom:13,animate:true});

}
